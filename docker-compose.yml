services:
  headscale-webui:
    build: .
    container_name: headscale-webui
    restart: unless-stopped
    network_mode: "host"
    environment:
      - PORT=3000
      # URL de votre serveur Headscale (API + commande tailscale up)
      - HEADSCALE_URL=http://127.0.0.1:8080
      # Clé API Headscale - À GÉNÉRER avec: headscale apikeys create
      - HEADSCALE_API_KEY=VOTRE_CLE_API_ICI
      - SESSION_SECRET=change-this-to-a-random-secret
      - ADMIN_USER=admin
      - ADMIN_PASS=admin
      - DB_PATH=/app/data/headscale-webui.db
    volumes:
      - webui-data:/app/data

volumes:
  webui-data:
