services:
  headscale-webui:
    build: .
    container_name: headscale-webui
    restart: unless-stopped
    # network_mode host pour que le conteneur utilise
    # directement le binaire headscale installé sur la machine
    network_mode: "host"
    environment:
      - PORT=3000
      # URL publique de votre serveur Headscale
      # Utilisée UNIQUEMENT pour générer la commande "tailscale up"
      - HEADSCALE_URL=http://VOTRE_IP_OU_DOMAINE:8080
      - HEADSCALE_BIN=headscale
      - SESSION_SECRET=change-this-to-a-random-secret
      - ADMIN_USER=admin
      - ADMIN_PASS=admin
      - DB_PATH=/app/data/headscale-webui.db
    volumes:
      - webui-data:/app/data
      # Monte le binaire headscale de l'hôte dans le conteneur
      - /usr/local/bin/headscale:/usr/local/bin/headscale:ro
      # Monte la config headscale de l'hôte (adapter le chemin si besoin)
      - /etc/headscale:/etc/headscale:ro
      # Monte le socket Unix si headscale l'utilise
      - /var/run/headscale:/var/run/headscale

volumes:
  webui-data:
